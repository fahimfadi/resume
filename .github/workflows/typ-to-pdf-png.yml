name: Compile .typ to PDF and PNG

on:
  push:
    branches:
      - main

jobs:
  compile-and-convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install TeX Live and ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-fonts-extra imagemagick poppler-utils

      - name: Compile .typ files to .pdf
        run: |
          shopt -s globstar nullglob
          IFS=$'\n'
          for src in $(find . -type f -name '*.typ' -print0 | xargs -0 -n1); do
            dir=$(dirname "$src")
            base=$(basename "$src" .typ)
            # compile in file's directory so relative includes work
            (
              cd "$dir" || exit 1
              # run pdflatex twice to resolve references (adjust if .typ needs different compile command)
              pdflatex -interaction=nonstopmode -halt-on-error "$base.typ" >/dev/null 2>&1 || true
              pdflatex -interaction=nonstopmode -halt-on-error "$base.typ" >/dev/null 2>&1 || true
            )
          done

      - name: Convert first page of PDFs to high-quality PNG with white background
        run: |
          shopt -s globstar nullglob
          IFS=$'\n'
          for pdf in $(find . -type f -name '*.pdf' -print0 | xargs -0 -n1); do
            out="${pdf%.pdf}.png"
            # use pdftoppm for better control: create PNG from first page at 300 DPI, then ensure white background
            tmp_png="$(mktemp --suffix=.png)"
            pdftoppm -png -r 300 -f 1 -singlefile "$pdf" "${tmp_png%.png}" >/dev/null 2>&1 || true
            if [ -f "${tmp_png}" ]; then
              # remove alpha by flattening on white background
              convert "${tmp_png}" -background white -alpha remove -alpha off "$out"
              rm -f "${tmp_png}"
            fi
          done

      - name: Commit and push generated files (if any)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A '*.pdf' '*.png'
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Add/Update compiled PDFs and PNGs from .typ sources"
          git push
