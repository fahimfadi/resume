name: Compile .typ to PDF and PNG

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile-and-convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends imagemagick poppler-utils

      - name: Compile .typ files to .pdf
        run: |
          set -euo pipefail
          IFS=$'\n'
          while IFS= read -r -d '' src; do
            dir=$(dirname "$src")
            base=$(basename "$src" .typ)
            (
              cd "$dir"
              echo "Compiling $src -> $base.pdf"
              typst compile --font-path fonts "$base.typ" "$base.pdf"
            )
          done < <(find . -type f -name '*.typ' -print0)

      - name: Convert first page of PDFs to high-quality PNG with white background
        run: |
          set -euo pipefail
          while IFS= read -r -d '' pdf; do
            out="${pdf%.pdf}.png"
            echo "Rendering ${pdf} -> ${out}"
            tmpdir=$(mktemp -d)
            # pdftoppm writes to tmpdir/base-1.png when given prefix
            pdftoppm -png -r 300 -f 1 -singlefile "$pdf" "$tmpdir/page" >/dev/null 2>&1
            if [ -f "$tmpdir/page.png" ]; then
              convert "$tmpdir/page.png" -background white -alpha remove -alpha off "$out"
              rm -rf "$tmpdir"
            else
              echo "Warning: failed to render $pdf"
              rm -rf "$tmpdir"
            fi
          done < <(find . -type f -name '*.pdf' -print0)

      - name: Commit and push generated files (if any)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A -- '*.pdf' '*.png' || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Add/Update compiled PDFs and PNGs from .typ sources"
          git push
